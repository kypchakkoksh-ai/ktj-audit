<!DOCTYPE html>
<html lang="ru">
<head><!-- Библиотеки для парсинга файлов прямо в браузере без нагрузки на Vercel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аудит ТС и ТД АО «НК «КТЖ»</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { font-size: 22px; color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .section { margin-bottom: 20px; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .section-title { font-weight: bold; color: #94a3b8; margin-bottom: 10px; display: block; }
        label { display: block; margin-top: 10px; font-size: 14px; color: #cbd5e1; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 10px; margin-top: 5px; background: #1e293b; border: 1px solid #475569; border-radius: 6px; color: #fff; box-sizing: border-box; }
        .badge-open { display: inline-block; background: #059669; color: #fff; font-size: 12px; padding: 3px 8px; border-radius: 4px; margin-left: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { background: #0284c7; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; }
        button:hover { background: #0369a1; }
        .btn-secondary { background: #475569; }
        .btn-secondary:hover { background: #334155; }
        #output { margin-top: 20px; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Сервис аудита ТС и ТД АО «НК «КТЖ»</h1>

    <!-- 1. Настройки ключей и доступов -->
    <div class="section">
        <span class="section-title">1. Настройка доступов и интеграций</span>
        
        <label>Gemini API Key:*</label>
        <input type="password" id="geminiKey" placeholder="AIzaSy..." />

        <div class="grid-2">
            <div>
                <label>База EnSU <span class="badge-open">Открытый доступ</span></label>
                <input type="text" value="API не требуется (прямой поиск)" disabled style="opacity: 0.6; cursor: not-allowed;" />
            </div>
            <div>
                <label>Авторизация ПРГ (Параграф):</label>
                <input type="text" id="prgLogin" placeholder="Логин (Email)" />
                <input type="password" id="prgPassword" placeholder="Пароль" style="margin-top: 5px;" />
            </div>
        </div>
    </div>

    <!-- 2. Загрузка документов -->
    <div class="section">
        <span class="section-title">2. Тексты документов для проверки</span>
        
        <label>План закупок / Заявка:</label>
        <textarea id="docPlan" rows="3" placeholder="Вставьте текст или выдержки из Плана..."></textarea>

        <label>Техническая спецификация (РУС):</label>
        <textarea id="docTechRu" rows="4" placeholder="Текст ТС на русском языке..."></textarea>

        <label>Техническая спецификация (КАЗ):</label>
        <textarea id="docTechKz" rows="4" placeholder="Текст ТС на казахском языке..."></textarea>

        <label>Требования к Потенциальному Поставщику:</label>
        <textarea id="docSupplier" rows="3" placeholder="Квалификационные требования..."></textarea>
    </div>

    <!-- Действия -->
    <div class="grid-2">
        <button onclick="runPreCheck()" class="btn-secondary">🔍 Предварительная проверка (ГОСТ / СТ / ПРГ)</button>
        <button onclick="runFullAudit()">⚡ Запустить полный аудит по Чек-листу</button>
    </div>

    <!-- Результат -->
    <div id="output" style="display:none;"></div>
</div>

<script>
    async function runPreCheck() {
        const apiKey = document.getElementById('geminiKey').value;
        if (!apiKey) return alert('Введите Gemini API Key!');

        await savePrgConfig();

        const docs = {
            plan: document.getElementById('docPlan').value,
            techRu: document.getElementById('docTechRu').value,
            techKz: document.getElementById('docTechKz').value,
            supplier: document.getElementById('docSupplier').value
        };

        showOutput('Выполняется анализ ссылок и стандартов EnSU/ПРГ...');

        try {
            const res = await fetch('/api/pre-check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ apiKey, docs })
            });
            const data = await res.json();
            showOutput(data.result || data.error);
        } catch (e) {
            showOutput('Ошибка: ' + e.message);
        }
    }

    async function runFullAudit() {
        const apiKey = document.getElementById('geminiKey').value;
        if (!apiKey) return alert('Введите Gemini API Key!');

        await savePrgConfig();

        const docs = {
            plan: document.getElementById('docPlan').value,
            techRu: document.getElementById('docTechRu').value,
            techKz: document.getElementById('docTechKz').value,
            supplier: document.getElementById('docSupplier').value
        };

        showOutput('Запущен глубокий аудит по пунктам 6.1–6.15...');

        try {
            const res = await fetch('/api/full-audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ apiKey, docs })
            });
            const data = await res.json();
            showOutput(JSON.stringify(data, null, 2));
        } catch (e) {
            showOutput('Ошибка: ' + e.message);
        }
    }

    async function savePrgConfig() {
        const login = document.getElementById('prgLogin').value;
        const password = document.getElementById('prgPassword').value;
        if (login || password) {
            await fetch('/api/config/prg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
        }
    }

    function showOutput(text) {
        const out = document.getElementById('output');
        out.style.display = 'block';
        out.textContent = text;
    }
</script>

</body>
</html>
